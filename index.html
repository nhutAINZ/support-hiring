<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Safe patch for iframe runtime where window.fetch has only a getter
      (function() {
        try {
          var target = window;
          var desc = Object.getOwnPropertyDescriptor(target, 'fetch');
          if (!desc) {
            target = Object.getPrototypeOf(window) || window;
            desc = Object.getOwnPropertyDescriptor(target, 'fetch');
          }
          if (desc && desc.get && !desc.set) {
            var currentFetch = window.fetch;
            Object.defineProperty(target, 'fetch', {
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Safety patch for fetch failed to initialize:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
