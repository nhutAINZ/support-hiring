<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Super-robust safety patch to ensure window.fetch is writable across iframe and sandbox environments
      (function() {
        try {
          var originalFetch = window.fetch;
          var storedFetch = originalFetch;

          // 1. Try defining on Window.prototype, where fetch normally lives
          if (typeof Window !== 'undefined' && Window.prototype) {
            try {
              Object.defineProperty(Window.prototype, 'fetch', {
                get: function() { return storedFetch; },
                set: function(val) { storedFetch = val; },
                configurable: true,
                enumerable: true
              });
            } catch (e1) {}
          }

          // 2. Try defining directly on the window instance
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return storedFetch; },
              set: function(val) { storedFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (e2) {
            // 3. Fallback: try defining on the prototype chain of window if window itself is non-configurable
            try {
              var proto = Object.getPrototypeOf(window);
              if (proto) {
                Object.defineProperty(proto, 'fetch', {
                  get: function() { return storedFetch; },
                  set: function(val) { storedFetch = val; },
                  configurable: true,
                  enumerable: true
                });
              }
            } catch (e3) {}
          }
        } catch (globalErr) {
          console.warn("Safety patch for fetch failed to initialize:", globalErr);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
